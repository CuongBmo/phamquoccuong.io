<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Room</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="controls">
        <input type="checkbox" id="night">
        <label for="night">🌙 Chuyển Ngày / Đêm</label>
    </div>

    <div class="room">

        <div class="sun"></div>
        <div class="moon"></div>

        <div class="message">
            🐱 Meow... Chào bạn!
        </div>

        <div class="bed"></div>

        <div class="food"></div>

        <div class="cat">
            <span>🐱</span>
        </div>

        <div class="floor"></div>

    </div>

    <div class="status">
        <h2>🐱 Mèo Mun</h2>

        <p>❤️ Sức khỏe</p>
        <div class="bar">
            <div class="fill health"></div>
        </div>

        <p>🍖 No bụng</p>
        <div class="bar">
            <div class="fill hunger"></div>
        </div>

        <p>😴 Năng lượng</p>
        <div class="bar">
            <div class="fill energy"></div>
        </div>

        <p>😊 Hạnh phúc</p>
        <div class="bar">
            <div class="fill happy"></div>
        </div>
    </div>

</div>

</body>
</html>
